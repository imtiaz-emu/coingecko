# Files in the config/locales directory are used for internationalization and
# are automatically loaded by Rails. If you want to use locales other than
# English, add the necessary files in this directory.
#
# To use the locales, use `I18n.t`:
#
#     I18n.t "hello"
#
# In views, this is aliased to just `t`:
#
#     <%= t("hello") %>
#
# To use a different locale, set it with `I18n.locale`:
#
#     I18n.locale = :es
#
# This would use the information in config/locales/es.yml.
#
# To learn more about the API, please read the Rails Internationalization guide
# at https://guides.rubyonrails.org/i18n.html.
#
# Be aware that YAML interprets the following case-insensitive strings as
# booleans: `true`, `false`, `on`, `off`, `yes`, `no`. Therefore, these strings
# must be quoted to be interpreted as strings. For example:
#
#     en:
#       "yes": yup
#       enabled: "ON"

en:
  errors:
    short_url:
      url_blank:           "Please enter a URL."
      url_too_long:        "URL must be under 2048 characters."
      invalid_scheme:      "Only http and https URLs are supported."
      missing_host:        "URL must include a valid hostname."
      malformed_url:       "That doesn't look like a valid URL."
      private_address:     "That URL points to a private or reserved address."
      slug_reserved:       "That slug is reserved and cannot be used."
      slug_taken:          "That custom slug is already in use."
      slug_too_long:       "Custom slug must be 15 characters or fewer."
      slug_invalid_chars:  "Slug may only contain letters, numbers, hyphens, and underscores."
      collision_exhausted: "Could not generate a unique code. Please try again."
      generic:             "Something went wrong. Please try again."
